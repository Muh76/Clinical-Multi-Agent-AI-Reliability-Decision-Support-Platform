[project]
name = "clinical-ai-agents"
version = "0.1.0"
description = "Agent orchestration interfaces and implementations"
requires-python = ">=3.12"
dependencies = [
  "clinical-ai-shared",
  "clinical-ai-multimodal",
  "clinical-ai-platform",
  "clinical-ai-retrieval",
  "pydantic>=2.7.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/clinical_ai_agents"]

