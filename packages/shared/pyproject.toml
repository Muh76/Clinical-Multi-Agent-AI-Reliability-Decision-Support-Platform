[project]
name = "clinical-ai-shared"
version = "0.1.0"
description = "Shared domain primitives and contracts"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/clinical_ai_shared"]

