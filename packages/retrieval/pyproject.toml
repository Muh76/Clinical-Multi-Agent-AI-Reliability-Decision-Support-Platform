[project]
name = "clinical-ai-retrieval"
version = "0.1.0"
description = "Evidence retrieval and indexing pipelines"
requires-python = ">=3.12"
dependencies = [
  "clinical-ai-shared",
  "pydantic>=2.7.0",
  "qdrant-client>=1.9.1",
  "sentence-transformers>=2.7.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/clinical_ai_retrieval"]
