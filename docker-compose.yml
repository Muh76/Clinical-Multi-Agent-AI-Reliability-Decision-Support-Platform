name: clinical-ai-platform

x-api-env: &api-env
  APP_NAME: ${APP_NAME:-Clinical AI Reliability & Decision Intelligence Platform}
  APP_VERSION: ${APP_VERSION:-0.1.0}
  ENVIRONMENT: ${ENVIRONMENT:-local}
  ENABLE_DOCS: ${ENABLE_DOCS:-true}
  API_HOST: ${API_HOST:-0.0.0.0}
  API_PORT: ${API_PORT:-8000}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://clinical_ai:clinical_ai@clinical-ai-postgres:5432/clinical_ai}
  REDIS_URL: ${REDIS_URL:-redis://clinical-ai-redis:6379/0}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_JSON: ${LOG_JSON:-true}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-clinical-ai-api}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  VECTOR_PROVIDER: ${VECTOR_PROVIDER:-qdrant}
  VECTOR_DATABASE_URL: ${VECTOR_DATABASE_URL:-http://clinical-ai-qdrant:6333}
  VECTOR_DATABASE_API_KEY: ${VECTOR_DATABASE_API_KEY:-}
  VECTOR_COLLECTION_PREFIX: ${VECTOR_COLLECTION_PREFIX:-clinical_ai}
  VECTOR_EMBEDDING_MODEL: ${VECTOR_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}

services:
  clinical-ai-api:
    container_name: clinical-ai-api
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: development
    env_file:
      - path: .env
        required: false
    environment:
      <<: *api-env
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    depends_on:
      clinical-ai-postgres:
        condition: service_healthy
      clinical-ai-redis:
        condition: service_healthy
      clinical-ai-qdrant:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/workspace:cached
      - clinical_ai_uv_cache:/root/.cache/uv
    networks:
      - clinical-ai-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.getenv('API_PORT', '8000') + '/health/live', timeout=2).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    command: ["sh", "./infra/docker/start-api.sh"]

  clinical-ai-postgres:
    container_name: clinical-ai-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinical_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinical_ai}
      POSTGRES_DB: ${POSTGRES_DB:-clinical_ai}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - clinical_ai_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - clinical-ai-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1"
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  clinical-ai-redis:
    container_name: clinical-ai-redis
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    volumes:
      - clinical_ai_redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - clinical-ai-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  clinical-ai-qdrant:
    container_name: clinical-ai-qdrant
    image: qdrant/qdrant:v1.9.2
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    restart: unless-stopped
    volumes:
      - clinical_ai_qdrant_data:/qdrant/storage
    networks:
      - clinical-ai-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail http://127.0.0.1:6333/healthz || exit 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  clinical_ai_postgres_data:
  clinical_ai_redis_data:
  clinical_ai_qdrant_data:
  clinical_ai_uv_cache:

networks:
  clinical-ai-internal:
    name: clinical-ai-internal
    driver: bridge
